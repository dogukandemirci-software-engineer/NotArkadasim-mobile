# Configures the Dart analyzer for static analysis, linting, and error detection.
# This file extends the recommended Flutter lints and customizes rules for better code quality.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"          # Generated files should be excluded from linting
    - "**/*.freezed.dart"    # Exclude code generated by freezed package
    - "**/*.mocks.dart"      # Exclude mock files
  errors:
    # Daha sıkı hale getirmek için bazı uyarıları hata olarak işaretleyebilirsin:
    unused_import: error
    dead_code: error

linter:
  rules:
    # Stil ve kod kalitesi için ek kurallar:
    always_declare_return_types: true
    avoid_print: true          # Print kullanımını engelle (log paketleri tercih edilir)
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    avoid_empty_else: true
    curly_braces_in_flow_control_structures: true
    no_leading_underscores_for_local_identifiers: true
    sort_constructors_first: true
    avoid_return_types_on_setters: true

    # Performans ve okunabilirlik artırıcı:
    avoid_redundant_argument_values: true
    avoid_returning_null_for_void: true

    # İstersen aşağıdaki gibi bazı kuralları proje özelinde kapatabilirsin:
    # prefer_single_quotes: false

# Daha fazla detay ve kurallar için:
# https://dart.dev/guides/language/analysis-options
